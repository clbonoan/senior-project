<!DOCTYPE html>
<html lang="en">

<head>
  <title>Shadow Check</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='/style.css') }}">
  <link rel ="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon2.png')}}">
</head>
<body>
  <canvas id="hex-canvas"></canvas>

  <nav class="navbar">
    <div class="nav-left">
      <a href="/" class="nav-logo-link">
        <img src="{{ url_for('static', filename='favicon2.png') }}" alt="Home" class="nav-logo">
        <span class="nav-wordmark">Shadow Check</span>
      </a>
    </div>
    <div class="nav-right" id="nav-right">
      <a href="/repo">Repository </a>
      <a href="/about">About</a>
      <a href="/info">Information</a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <div id="home-container">
    <h1 id="home-title">
      <span class="title-plain">Shadow</span>
      <span class="title-accent">Check</span>
    </h1>

    <h3>Upload a ground-level urban image to see how our system detects
      <br> image tampering in urban infrastructure images through shadow features.
    </h3>

    <form id="uploadForm">
      <label for="fileInput" class="custom-upload" id="customUpload">
        <div class="upload-title">Click to Upload Image</div>
        <div class="upload-info">Supports JPEG, JPG</div>
      </label>
      <input type="file" id="fileInput" name="file" hidden/>
    </form>

    <br>
    <br>

    <div id="preview-container">
      <img id="preview" src="" alt="Image preview will appear here">
    </div>

    <div class="analyze-row">
      <button id="analyzeButton" type="button" hidden>
        Analyze
      </button>
    </div>

    <div class="analyzing-section">
        <div id="loadingIndicator" class="hidden">Analyzing image…</div>
    </div>

    <div id="total-result-container">
      <div id="result"></div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
  <script>
    /* handling functionality for hamburger icon */
    const hamburger = document.getElementById('hamburger');
    const navRight = document.getElementById('nav-right');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navRight.classList.toggle('open');
    });
  </script>

</body>
</html>
